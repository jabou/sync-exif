name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: shellcheck bin/sync-exif

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl bats

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install exiftool bats-core bash
          # Ensure `env bash` resolves to Homebrew's bash 5, not the system 3.2.
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Versions
        run: |
          bash --version | head -1
          exiftool -ver
          bats --version
          python3 --version

      - name: Run tests
        run: bats test/sync-exif.bats
